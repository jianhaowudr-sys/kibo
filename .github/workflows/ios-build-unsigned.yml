name: Build unsigned iOS .ipa for SideStore

on:
  workflow_dispatch:    # manual trigger from GitHub UI
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '*.md'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run expo prebuild (generate ios/ folder)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Detect workspace and scheme
        id: detect
        working-directory: ios
        run: |
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          export WS_NAME=$(basename "$WORKSPACE" .xcworkspace)
          SCHEMES=$(xcodebuild -workspace "$WORKSPACE" -list -json)
          echo "Available schemes:"
          echo "$SCHEMES" | python3 -c "import sys,json; d=json.load(sys.stdin); print('\n'.join(d['workspace']['schemes']))"
          SCHEME=$(echo "$SCHEMES" | python3 -c "import sys,json,os; d=json.load(sys.stdin); s=d['workspace']['schemes']; ws=os.environ['WS_NAME']; m=[x for x in s if x.lower()==ws.lower()]; print(m[0] if m else s[0])")
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Build unsigned .app
        working-directory: ios
        run: |
          xcodebuild \
            -workspace "${{ steps.detect.outputs.workspace }}" \
            -scheme "${{ steps.detect.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath $PWD/build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            EXPANDED_CODE_SIGN_IDENTITY= \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package .app into fake .ipa (zip Payload)
        working-directory: ios
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          echo "Found app: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -qr kibo.ipa Payload && cd ..
          ls -lh build/kibo.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: kibo-unsigned-ipa
          path: ios/build/kibo.ipa
          retention-days: 30
